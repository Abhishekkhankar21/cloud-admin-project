---
- name: Setup Monitoring Stack (Prometheus + Grafana)
  hosts: monitoring
  become: yes
  vars:
    prometheus_version: "2.48.0"
    grafana_version: "10.3.0"

  tasks:

  # --------------------------
  # 1️⃣ Install dependencies
  # --------------------------
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install required packages
    apt:
      name:
        - wget
        - tar
        - curl
        - gnupg
        - software-properties-common
      state: present

  # --------------------------
  # 2️⃣ Install Prometheus
  # --------------------------
  - name: Download Prometheus tar
    get_url:
      url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
      dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"

  - name: Extract Prometheus
    unarchive:
      src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
      dest: /opt/
      remote_src: yes
      creates: "/opt/prometheus-{{ prometheus_version }}"

  - name: Create symlink for Prometheus
    file:
      src: "/opt/prometheus-{{ prometheus_version }}"
      dest: /opt/prometheus
      state: link

  - name: Create Prometheus user
    user:
      name: prometheus
      system: yes
      shell: /usr/sbin/nologin

  - name: Set ownership for Prometheus directories
    file:
      path: "/opt/prometheus"
      owner: prometheus
      group: prometheus
      recurse: yes

  - name: Create Prometheus systemd service
    copy:
      dest: /etc/systemd/system/prometheus.service
      content: |
        [Unit]
        Description=Prometheus
        Wants=network-online.target
        After=network-online.target

        [Service]
        User=prometheus
        Group=prometheus
        Type=simple
        ExecStart=/opt/prometheus/prometheus \
          --config.file=/opt/prometheus/prometheus.yml \
          --storage.tsdb.path=/opt/prometheus/data

        [Install]
        WantedBy=multi-user.target

  - name: Ensure Prometheus service is enabled and started
    systemd:
      name: prometheus
      enabled: yes
      state: started

  # --------------------------
  # 3️⃣ Install Grafana
  # --------------------------
  - name: Add Grafana GPG key
    apt_key:
      url: https://apt.grafana.com/gpg.key
      state: present

  - name: Add Grafana APT repository
    apt_repository:
      repo: "deb https://apt.grafana.com stable main"
      state: present

  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana={{ grafana_version }}
      state: present

  - name: Ensure Grafana service is enabled and started
    systemd:
      name: grafana-server
      enabled: yes
      state: started

  # --------------------------
  # 4️⃣ Optional: Firewall
  # --------------------------
  - name: Allow Prometheus port
    ufw:
      rule: allow
      port: 9090
      proto: tcp

  - name: Allow Grafana port
    ufw:
      rule: allow
      port: 3000
      proto: tcp